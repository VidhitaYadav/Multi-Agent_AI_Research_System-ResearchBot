services:
  - type: web
    name: multi-agent-ai-research-system-researchbot
    runtime: python
    plan: free
    rootDir: research-ui/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: TAVILY_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
  - type: web
    name: multi-agent-ai-research-system-frontend
    runtime: static
    plan: free
    rootDir: research-ui/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        sync: false
